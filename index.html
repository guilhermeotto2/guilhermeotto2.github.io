<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="js/script.js" defer></script>
    <title>Client Log</title>
</head>
<body>
    <div class="left">
        <ul class="left_ul">
            <li> <a href="index.html"> <i class="fa-solid fa-house"></i> </a> </li>
            <li> <a href="pages/contabil/index.html"> <i class="fa-solid fa-money-check-dollar"> </i> </a> </li>
            <li> <a href="pages/funcionarios/index.html"> <i class="fa-solid fa-users"></i> </a></li>
        </ul>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {
            // Obtém o caminho da página atual
            var currentPage = window.location.pathname;

            // Adiciona a classe 'selected-icon' ao ícone correspondente à página atual
            $('.left_ul li a').each(function () {
                var href = $(this).attr('href');
                // Adiciona a classe 'selected-icon' se a página atual for a página inicial
                if (currentPage.indexOf(href) !== -1 || currentPage === '/' && href === 'index.html') {
                    $(this).find('i').addClass('selected-icon');
                }
            });
        });
    </script>


<div class="todo-container">
    <header>
    <h1>Client Log</h1>
    <br>
    </header>

    <form id="todo-form"> <br>
    <p>Registre seu cliente</p>
    <br>
    <div class="form-control">
        <input
        type="text"
        id="todo-input"
        placeholder="Nome do cliente:"
        />
        <button type="submit" class="plus">
        <i class="fa-thin fa-plus"></i>
        </button>
    </div>
    </form>

    <form id="edit-form" class="hide">
    <p>Edite sua tarefa</p>
    <div class="form-control">
        <input type="text" id="edit-input" />
        <button type="submit">
        <i class="fa-solid fa-check-double"></i>
        </button>
    </div>
    <button id="cancel-edit-btn">Cancelar</button>
    </form>

    <div id="toolbar">
    <div id="search"> <br>
        <h4>Pesquisar:</h4> 
        <br>
        <form>
        <input type="text" id="search-input" placeholder="Buscar..." />
        <button id="erase-button">
            <i class="fa-solid fa-delete-left"></i>
        </button>
        </form>
    </div>

    <div id="filter">
        <h4>Filtrar:</h4>
        <select id="filter-select">
        <option value="all">Todos</option>
        <option value="done">Feitos</option>
        <option value="todo">A fazer</option>
        </select>
    </div>
    </div>

    <div id="todo-list">
        <!--
        <div class="todo">
        <h3>Estou fazendo algo aqui...</h3>
        <button class="finish-todo">
        <i class="fa-solid fa-check"></i>
        </button>
        <button class="edit-todo">
        <i class="fa-solid fa-pen"></i>
        </button>
        <button class="remove-todo">
        <i class="fa-solid fa-xmark"></i>
        </button>
        -->
    </div> 


    
</div>
</body>
</html>
